services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: server/.env.example
    depends_on:
      - mongo
      - redis
    ports:
      - "5000:5000"
  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - server
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
volumes:
  mongo-data:
  redis-data:
